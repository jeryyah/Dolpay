openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sync
    description: Cloud data sync operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /sync:
    get:
      operationId: syncGet
      tags: [sync]
      summary: Pull all synced keys
      description: Returns the full snapshot of all stored key-value pairs
      responses:
        "200":
          description: Full snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncSnapshot"
    post:
      operationId: syncPost
      tags: [sync]
      summary: Push a single key
      description: Stores a key using Last-Writer-Wins logic based on version timestamp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPushBody"
      responses:
        "200":
          description: Result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncPushResult"
        "400":
          description: Bad request
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SyncEntry:
      type: object
      properties:
        value:
          type: string
          nullable: true
        v:
          type: number
      required:
        - value
        - v
    SyncSnapshot:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/SyncEntry"
    SyncPushBody:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
          nullable: true
        v:
          type: number
      required:
        - key
        - v
    SyncPushResult:
      type: object
      properties:
        stored:
          type: boolean
        v:
          type: number
        value:
          type: string
          nullable: true
      required:
        - stored
        - v
        - value
