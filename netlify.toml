[build]
  command = "pnpm install --no-frozen-lockfile && BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/viorelvar-market run build"
  publish = "artifacts/viorelvar-market/dist/public"

# Netlify Functions: serverless proxy for the Rama Shop QRIS gateway so the
# browser can call it without CORS issues. See netlify/functions/rama.mts —
# it forwards /api/rama/* to https://ramashop.my.id/* with X-API-Key header
# pass-through.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"
  PNPM_FLAGS = "--shamefully-hoist"
  # Skip bundling viorelvar-project.tar.gz into the publish dir; it's served
  # from a GitHub Release instead (see VITE_DOWNLOAD_URL below).
  SKIP_BUNDLE = "1"
  # Admin "Download Project" button points to the GitHub Release asset so we
  # don't burn Netlify bandwidth on the 24 MB archive.
  VITE_DOWNLOAD_URL = "https://github.com/jeryyah/Dolpay/releases/download/v1.0.0/viorelvar-project.tar.gz"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

[[headers]]
  for = "/viorelvar-project.tar.gz"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"
    Content-Type = "application/gzip"
    Content-Disposition = "attachment; filename=viorelvar-project.tar.gz"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Rama Shop QRIS gateway proxy — must come BEFORE the SPA catch-all so the
# `/*` rewrite below doesn't swallow the function URL. Netlify Functions v2
# auto-binds the function via its exported `config.path`, but we keep this
# explicit rule as a safety net.
[[redirects]]
  from = "/api/rama/*"
  to = "/.netlify/functions/rama/:splat"
  status = 200
  force = true

# SPA fallback — all unmatched paths go to index.html so client-side routing works.
# Data lives in localStorage; the QRIS gateway is reached either directly (if
# Rama allows the site origin in CORS) or via the /api/rama proxy above.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
