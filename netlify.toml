[build]
  command = "pnpm install --no-frozen-lockfile && BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/viorelvar-market run build"
  publish = "artifacts/viorelvar-market/dist/public"

# Live Chat + cross-device sync backend — server-side store via Netlify Blobs.
# Function file: netlify/functions/chat.ts dan sync.ts (auto-routed ke /api/chat
# dan /api/sync berkat `export const config = { path: "..." }`).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Pastikan Netlify ikut bundle deps dari root pnpm workspace.
  included_files = ["node_modules/@netlify/**"]

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"
  PNPM_FLAGS = "--shamefully-hoist"
  # Skip bundling viorelvar-project.tar.gz into the publish dir; it's served
  # from a GitHub Release instead (see VITE_DOWNLOAD_URL below).
  SKIP_BUNDLE = "1"
  # Admin "Download Project" button points to the GitHub Release asset so we
  # don't burn Netlify bandwidth on the 24 MB archive.
  VITE_DOWNLOAD_URL = "https://github.com/jeryyah/Dolpay/releases/download/v1.0.0/viorelvar-project.tar.gz"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

[[headers]]
  for = "/viorelvar-project.tar.gz"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"
    Content-Type = "application/gzip"
    Content-Disposition = "attachment; filename=viorelvar-project.tar.gz"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Pastikan rute /api/* tidak ditelan SPA fallback — ini jaring pengaman
# kalau `export const config = { path }` di function tidak ke-detect.
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

[[redirects]]
  from = "/api/sync"
  to = "/.netlify/functions/sync"
  status = 200
  force = true

# SPA fallback — all unmatched paths go to index.html so client-side routing works.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
