[build]
  command = "pnpm install --no-frozen-lockfile && BASE_PATH=/ PORT=3000 NODE_ENV=production pnpm --filter @workspace/viorelvar-market run build"
  publish = "artifacts/viorelvar-market/dist/public"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--version"
  PNPM_FLAGS = "--shamefully-hoist"
  # Skip bundling viorelvar-project.tar.gz into the publish dir; it's served
  # from a GitHub Release instead (see VITE_DOWNLOAD_URL below).
  SKIP_BUNDLE = "1"
  # Admin "Download Project" button points to the GitHub Release asset so we
  # don't burn Netlify bandwidth on the 24 MB archive.
  VITE_DOWNLOAD_URL = "https://github.com/jeryyah/Dolpay/releases/download/v1.0.0/viorelvar-project.tar.gz"

[[headers]]
  for = "/version.json"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"

[[headers]]
  for = "/viorelvar-project.tar.gz"
  [headers.values]
    Cache-Control = "no-store, must-revalidate"
    Content-Type = "application/gzip"
    Content-Disposition = "attachment; filename=viorelvar-project.tar.gz"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback — all unmatched paths go to index.html so client-side routing works.
# This app is fully client-side (data lives in localStorage; payment gateway is
# called directly from the browser to whichever URL admin configures), so there
# is no /api/* proxy needed.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
